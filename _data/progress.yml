# ═══════════════════════════════════════════════════════
# About page — edit these numbers as you level up.
# All values are shown as progress bars or goal dots.
# ═══════════════════════════════════════════════════════

# Total bounty goal in dollars (the 100% target on the progress bar)
bounty_target: 100000

# Skills — set 0-100 to show progress bar fill %
skills:
  web:   15    # Web security
  code:  5     # Source code review
  recon: 20    # Recon & automation
  ai:    0     # AI red teaming
  yt:    0     # Content / YouTube

# Certifications — set 0-100 for study progress %
certs:
  oswe: 0
  oscp: 0
  osai: 0

# Goals — set true when achieved, false when not yet
goals:
  bounty1:  true    # First valid bounty
  tenk:     false   # $10,000 total
  hundredk: false   # $100,000 total
  oswe:     false   # OSWE certified
  youtube:  false   # YouTube launched
  fulltime: false   # Full-time hunting
